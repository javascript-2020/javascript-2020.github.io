        async function install_espree(){
                                                                                var str   = packages.join(' ');
                                                                                console.log('npm install',str,'...');
              packages.unshift('install');
              var process   = await webcontainer.spawn('npm',packages);
              var stream    = new WritableStream({write(data){term.write(data)}});
              process.output.pipeTo(stream)
              var code      = await process.exit;
              if(code!=0){
                                                                                console.log('an error occurred');
              }
              return code;
              
        }//install
        
        
        async function package_json(){
                                                                                console.log('npm install ( package.json ) ...');
              var process   = await webcontainer.spawn('npm',['install']);
              var stream    = new WritableStream({write(data){term.write(data)}});
              process.output.pipeTo(stream)
              var code      = await process.exit;
              if(code!=0){
                                                                                console.log('an error occurred');
              }
              return code;
              
        }//package_json
        
        
        async function install_rollup(){
        
              var packages    = [
                    'rollup',
                    '@rollup/plugin-commonjs',
                    '@rollup/plugin-node-resolve',
                    '@rollup/plugin-json',
                    'rollup-plugin-polyfill-node'
              ];
                                                                                console.log('npm install',packages.join(' '),'...');
              packages.unshift('install');
              
              var process   = await webcontainer.spawn('npm',packages);
              var stream    = new WritableStream({write(data){term.write(data)}});
              process.output.pipeTo(stream)
              var code      = await process.exit;
              if(code!=0){
                                                                                console.log('an error occurred');
              }
              return code;
              
        }//install_rollup
        
        
        rollup.esm    = async function(){
                                                                                console.log('perform rollup esm ...');
              var process   = await webcontainer.spawn('npx',['-y','rollup','--config','rollup.config.esm.js']);
              
              var stream    = new WritableStream({write(data){term.write(data)}});
              process.output.pipeTo(stream);
              
              var code      = await process.exit;
              if(code!=0){
                                                                                console.log('an error occurred');
              }
              return code;
              
        }//esm
        
        
        rollup.cjs    = async function(){

                                                                                console.log('an error occurred');
              }

        }//cjs
        
        
        async function install_espree_browser(){
        
              var process   = await webcontainer('npm',['install','espree-browser']);
              var stream    = new WritableStream({write(data){term.write(data)}});
              process.output.pipeTo(stream);
              
              var code      = await process.exit;
              if(code!=0){
                                                                                console.log('an error occurred');
              }
              return code;
              
        }//install_espree_browser
        
        
        async function test_version(pkg){
        
              var [major,minor,patch]     = pkg.split('.');
              var espree                  = {major,minor,patch};
              
              var fn                      = 'node_modules/espree-browser/notes.txt';
              
              var uint8                   = await webcontainer.fs.readFile(fn);
              var blob                    = new Blob([uint8]);
              var txt                     = await blob.text();
              var lines                   = txt.split('\n');
              var line                    = line[0];
              var i                       = line.indexOf(':');
              var version                 = line.slice(i+1).trim();
              var [major,minor,patch]     = version.split('.');
              
              var result                  = (major==espree.major && minor==espree.minor && patch==espree.patch);
              if(result){
                    return true;
              }
              
              line                        = line.slice(0,i+1)+'   '+pkg;
              lines[0]                    = line;
              var txt                     = lines.join('\n');
              var blob                    = new Blob([txt]);
              var buf                     = await blob.arrayBuffer();
              var uint8                   = new Uint8Array(unit8);
              await webcontainer.fs.writeFile(fn,uint8);
              
              return false;
              
        }//test_version
        
        
        test.esm    = async function(url){

                                                                          console.log(espree);
              var code    = `

                          console.log('helloworld');
                          
                    }//fn
                    
              `;
              
              var result    = espree.parse(code);
              console.log(result);
              
        }//test
        
        
        test.cjs    = async function(url){
        
              var script      = document.createElement('script');
              script.src      = url;
              script.onload   = onload;
              document.head.append(script);
              
              
              function onload(){
                                                                          console.log(espree);

                          }//fn
                          
                    `;

                    console.log(result);
                    
              }//onload
              
        }//cjs
