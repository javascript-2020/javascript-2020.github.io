
      <link rel=stylesheet href='https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css'>
      
      <style>
      
  body
    {margin:20px;display:flex;flex-direction:column;gap:10px;font-family:arial}
    
  iframe
    {width:100%;height:300px}
    
  #terminal
    {height:500px}
    
      </style>
      
      <h3>es</h3>
      
      <iframe id=iframe></iframe>
      
      <div id=terminal></div>
      
      
      <script>
      
(()=>{

        var term;
        var webcontainer;
        var files   = {};
        
        
        var packages          = ['eslint-scope'];
        var filename          = 'esline-scope.js';
        
        
        
        
        
        async function setup(){
        
              var {Terminal}    = await import('https://cdn.jsdelivr.net/npm/@xterm/xterm/+esm');
              var {FitAddon}    = await import('https://cdn.jsdelivr.net/npm/@xterm/addon-fit/+esm');
              
              term                = new Terminal();
              var fitAddon        = new FitAddon();
              term.loadAddon(fitAddon);
              term.open(terminal);
              fitAddon.fit();
                                                                                console.clear();
                                                                                console.log('rollup example');
                                                                                console.log();
        }//setup
        
        
        setTimeout(start,50);
        
        
        async function start(){
        
              await setup();
              
              
              for(var key in files){
              
                    files[key]   = {file:{contents:files[key]}};
                    
              }//for
              
              
                                                                                console.log('download ...');
              var {WebContainer}    = await import('https://cdn.jsdelivr.net/npm/@webcontainer/api/+esm');
              
                                                                                console.log('booting ...');
              webcontainer          = await WebContainer.boot();
              
                                                                                console.log('mounting file system ...');
              await webcontainer.mount(files);
              
              
              await install();
              await package_json();
              await install_rollup();
              
              
              await rollup();
              
              var uint8   = await webcontainer.fs.readFile(filename);
              var blob    = new Blob([uint8],{type:'text/javascript'});
              var url     = window.URL.createObjectURL(blob);
              
              
              if(1){
                                                                                console.log('download...');
                    var a         = document.createElement('a');
                    a.href        = url;
                    a.download    = filename;
                    document.body.append(a);
                    a.click();
                                                                                console.log('done');
                    return;
              }
              
              var {espree}        = await import('https://libs.ext-code.com/external/js/espree/espree.m.js');
              var {estraverse}    = await import('https://libs.ext-code.com/external/js/estraverse/estraverse.m.js');
              var {scope}         = await import(url);
              
              var code    = `
              
                    function fn(){
                    
                          console.log('123');
                          
                    }//fn
                    
              `;
              
              
              const options = {
              	ecmaVersion: 2022,
              	sourceType: "module",
              };
              
              const ast             = espree.parse(code, { range: true, ...options });
              const scopeManager    = scope.analyze(ast, options);
              
              var currentScope    = scopeManager.acquire(ast); // global scope
              
              estraverse.traverse(ast, {
                  	enter(node, parent) {
                  		// do stuff
                    
                  		if (/Function/.test(node.type)) {
                  			currentScope = scopeManager.acquire(node); // get current function scope
                  		}
                  	},
                  	leave(node, parent) {
                  		if (/Function/.test(node.type)) {
                  			currentScope = currentScope.upper; // set to parent scope
                  		}
                    
                  		// do stuff
                  	},
              });
              
              
              
                                                                                console.log('done.');
                                                                                
                                                                                
              async function install(){
                                                                                var str   = packages.join(' ');
                                                                                console.log('npm install',str,'...');
                    packages.unshift('install');
                    var process   = await webcontainer.spawn('npm',packages);
                    var stream    = new WritableStream({write(data){term.write(data)}});
                    process.output.pipeTo(stream)
                    var code      = await process.exit;
                    if(code!=0){
                                                                                console.log('an error occurred');
                    }
                    return code;
                    
              }//install
              
              
              async function package_json(){
                                                                                console.log('npm install ( package.json ) ...');
                    var process   = await webcontainer.spawn('npm',['install']);
                    var stream    = new WritableStream({write(data){term.write(data)}});
                    process.output.pipeTo(stream)
                    var code      = await process.exit;
                    if(code!=0){
                                                                                console.log('an error occurred');
                    }
                    return code;
                    
              }//package_json
              
              
              async function install_rollup(){
              
                    var packages    = [
                          'rollup',
                          '@rollup/plugin-commonjs',
                          '@rollup/plugin-node-resolve',
                          '@rollup/plugin-json',
                          'rollup-plugin-polyfill-node'
                    ];
                                                                                console.log('npm install',packages.join(' '),'...');
                    packages.unshift('install');
                    
                    var process   = await webcontainer.spawn('npm',packages);
                    var stream    = new WritableStream({write(data){term.write(data)}});
                    process.output.pipeTo(stream)
                    var code      = await process.exit;
                    if(code!=0){
                                                                                console.log('an error occurred');
                    }
                    return code;
                    
              }//install_rollup
              
              
              async function rollup(){
                                                                                console.log('perform rollup ...');
                    var process   = await webcontainer.spawn('npx',['-y','rollup','--config','rollup.config.js']);
                    
                    var stream    = new WritableStream({write(data){term.write(data)}});
                    process.output.pipeTo(stream);
                    
                    var code      = await process.exit;
                    if(code!=0){
                                                                                console.log('an error occurred');
                    }
                    return code;
                    
              }//rollup
              
              
        }//start
        
        
  //:
  
  
        files['entry.js']   = `
        
              import * as scope from 'eslint-scope';
              //export {scope};
              
              export default scope;  // iife / umd
              
        `;
        
        
        files['package.json']   = `
        
              {
                    "name": "node-test",
                    "version": "1.0.0",
                    "scripts": {}
              }
              
        `;
        
        
        files['rollup.config.js']   = `
        
              import resolve from '@rollup/plugin-node-resolve';
              import commonjs from '@rollup/plugin-commonjs';
              import json from '@rollup/plugin-json';
              import nodePolyfills from 'rollup-plugin-polyfill-node';
              
              export default {
                input     : 'entry.js',
                output    : {
                                  file      : '${filename}',
                                  //format    : 'es'
                                  
                                  format    : 'iife',         // or 'umd'
                                  name      : 'scope',       // This becomes window.espree
                                  exports   : 'default',
                                  
                },
                plugins   : [
                                  commonjs(),
                                  json(),
                                  nodePolyfills(),
                                  resolve({preferBuiltins:false})
                            ]
              };
              
        `;
        
        
        
        
})();


</script>
