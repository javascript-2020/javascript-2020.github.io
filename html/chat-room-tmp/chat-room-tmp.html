                        <div>
                              <span class=label>
                                    password
                              </span>
                              <input id=password type=password value=abc-123>

                        <div id=show-password>
                              <span class=label>

      <script>
      
(function({mod,host}){

  var obj   = {
        [Symbol.toStringTag]    : 'chat-room-tmp',
        version                 : 'v1.0'
  };
  
        var df=true,did='chat-room-tmp';
        
        
        var log
        ;
        
        obj.initmod   = function(params){
        
              log   = mod.rd(params,'log',log);
              
        }//initmod
        
        
  //:
  
        var target;
        
        
        var rd    = {};
        rd.attr   = {};
        
  //:
  
  
        obj.init    = async function(){
        
              target    = host;
              
              rd.attr.server();
              rd.attr.room();
              
        }//init
        
        
        rd.attr.server    = function(){
        
              if(!target.hasAttribute('server'))return;
              server    = target.getAttribute('server');
              
        }//server
        
        
        rd.attr.room    = function(){
        
              if(!target.hasAttribute('room'))return;
              room    = target.getAttribute('room');
              
        }//room
        
        
  //:
  
  
        var shadow;
        
        
        //var server    = 'https://localhost:3009/chat/';
        var server    = '';
                                                                                console.log('server',server);
        var room    = 'main';
        
        var poll    = {
                            abort   : false,
                            time    : 2000,
                            timer   : null,
                      };
                      
        var msgs    = [];
        
        var view;
        var msg;
        
        
        var kd    = {};
        var btn   = {};
        
        
        obj.initdom   = async function(){
        
              shadow                          = host.shadowRoot;
              
              
              view    = $(shadow,'#view');
              
              msg     = $(view,'.msg');
              msg.remove();
              
              view.style.display              = '';
              
              
              var info                        = $(shadow,'#info');
              
              $.chkbox(info,'#show-password',btn.password);
              
              $(shadow,'#txt').onkeydown             = kd.user;
              $(shadow,'#txt').focus();
              
              $(shadow,'[value=send]').onclick       = btn.send;
              $(shadow,'[value=abort]').onclick      = ()=>poll.abort=true;
              
              
              post.start();
              
        }//initdom
        
        
        
        btn.password    = function(){
        
              $(shadow,'#txt').focus();
              
              var node    = $(shadow,'#password');
              if(node.getAttribute('type')=='password'){
                    node.removeAttribute('type');
              }else{
                    node.setAttribute('type','password');
              }
              
        }//password
        
        
        kd.user   = function(e){
        
              if(e.ctrlKey && e.key=='Enter'){
                    btn.send();
              }
              
        }//user
        
        
        btn.send    = function(){
        
              $('#txt').focus();
              
              var txt             = $(shadow,'#txt').value;
              $('#txt').value     = '';
              var user            = $(shadow,'#user').value;
              var password        = $(shadow,'#password').value;
              
              post.msg({user,password,txt});
              
        }//send
        
        
  //:
  
  
        display.list    = function(list){
        
              list.forEach(item=>{
              
                    var result    = msgs.find(msg=>msg.id===item.id);
                    if(!result){
                    
                          var insert    = false;
                          var n         = msgs.length;
                          for(var i=0;i<n;i++){
                          
                                var msg   = msgs[i];
                                if(msg.ts>item.ts){
                                      insert    = msg;
                                      msgs.splice(i,0,item);
                                      break;
                                }
                                
                          }//for
                          if(!insert){
                                msgs.push(item);
                          }
                          
                          var node    = display(item,insert?.node);
                          item.node   = node;
                          
                    }
                    
              });
              
        }//list
        
        
        function display(data,insert){
        
              var node;
              
              switch(data.type){
              
                case 'message'    : node    = display.message(data);        break;
                case 'delete'     : display.delete(data);                   break;
                
              }//switch
              
              if(node){
                    view.insertBefore(node,insert);
              }
              
              return node;
              
        }//display
        
        
        display.message   = function({id,user,txt,ts}){
        
              var config          = {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false};
              var format          = new Intl.DateTimeFormat(undefined,config);
              
              var err;
              try{
              
                    ts            = Number(ts);
                    var local     = format.format(new Date(ts));
                    var parts     = local.split(',');
                    local         = parts[2]+'  '+parts[0]+parts[1];
                    
              }//try
              catch(err2){
              
                    err   = err2;
                    
              }//catch
              if(err){
                                                                                console.log(name,txt,ts);
                    local   = err.toString();
              }
              
              
              var nmsg                        = msg.cloneNode(true);
              nmsg.id   = id;
              $(nmsg,'.user').textContent     = user;
              $(nmsg,'.txt').textContent      = txt;
              $(nmsg,'.ts').textContent       = local;
              $(nmsg,'.del').onclick          = del;
              
              return nmsg;
              
              
              async function del(){
              
                    var password    = $(shadow,'#password').value;
                    var result      = await post.del({password,id})
                    if(!result)return;
                    
              }//del
              
        }//message
        
        
        display.delete    = function({id,del,ts}){
                                                                                console.log('delete',del);
              var item    = msgs.find(data=>data.id===del);
              if(!item)return;
              $(item.node,'.txt').textContent   = 'deleted';
              
        }//delete
        
        
  //:
  
  
        async function post(path,json){
        
              post.promise    = new Promise(fn);
              return post.promise;
              
              
              async function fn(resolve){
              
                    var url       = server+path;
                    var body      = JSON.stringify(json);
                    var headers   = {};
                                                                                debug(url,body);
                    var err;
                    try{
                    
                          var res   = await fetch(url,{headers,method:'post',body});
                          
                    }//try
                    catch(err2){
                    
                          err   = err2;
                          
                    }//catch
                    if(err){
                          var error   = err.toString();
                          log.red(error);
                          exit();
                          return;
                    }
                    if(!res.ok){
                          var txt     = await res.text();
                          var error   = `${res.status} ${res.statusText||txt}`;
                                                                                console.log(error);
                                                                                console.log(txt);
                          log.red(error);
                          exit();
                          return;
                    }
                    
                    var result    = await res.json();
                    if(result.error){
                          log.red(result.error);
                          exit();
                          return;
                    }
                    exit(result);
                    
                    
                    function exit(result){
                                                                                //console.log(4);
                          post.promise    = null;
                          resolve(result);
                          
                    }//exit
                    
              }//fn
              
        }//post
        
        
        post.start    = async function(){
        
              var result    = await post('start',{room});
              if(!result)return;
              
              var list      = result.list;
              display.list(list);
              
              post.update.initial();
              
        }//start
        
        
        post.update   = async function(){
        
              var ts          = msgs.at(-1).ts;
              var result      = await post('update',{room,ts});
              if(!result)return;
              
              var list      = result.list;
              display.list(list);
              
              if(poll.abort)return;
              
              post.timer    = setTimeout(post.update,poll.time);
              
        }//update
        
        
        post.update.initial   = function(){
        
              post.timer    = setTimeout(post.update,poll.time);
              
        }//initial
        
        
        post.msg    = async function({user,password,txt}){
                                                                                //console.log('post.msg');
              clearTimeout(post.timer);
              if(post.promise){
                                                                                //console.log('post.promise');
                    await post.promise;
              }
              
              var ts          = msgs.at(-1).ts;
              var result      = await post('msg',{room,user,password,txt,ts});
              if(!result)return;
              
              var list    = result.list;
              display.list(list);
              
              post.update.initial();
              
        }//msg
        
        
        post.del    = async function({id,password}){
        
              clearTimeout(post.timer);
              if(post.promise){
                    await post.promise;
              }
              
              var ts          = msgs.at(-1).ts;
              var result      = await post('del',{room,id,password,ts});
              if(!result)return;
              
              var list      = result.list;
              display.list(list);
              
              post.update.initial();
              return true;
              
        }//del
        
        
        
        
        
        
        async function get(path,url){
        
              var url   = server+path;
              
              var err;
              try{
              
                    var res   = await fetch(url);
                    
              }//try
              catch(err2){
              
                    err   = err2;
                    
              }//catch
              if(err){
                    var error   = err.toString();
                    log.red(error);
                    return;
              }
              if(!res.ok){
                    var txt   = await res.text();
                    var error   = `${res.status} ${res.statusText||txt}`;
                    log.red(error);
                    return;
              }
              
              var result    = await res.json();
              if(result.error){
                    log.red(result.error);
                    return;
              }
              
        }//get
        
        
        
  //:
  
  
  
        function debug(...args){
        
              if(!df && !obj.df)return;
              
              args.unshift(`[ ${did} ]`);
              console.log.apply(console,args);
              
              /*
              var fmt     = Array.from({length:args.length}).fill('%O').join(' ');
              var args2   = [fmt].concat(args);
              console.groupCollapsed.apply(console,args2);
              console.trace();
              console.groupEnd();
              */
              
        }//debug
        
        
        
        
  //:
  
  
  
  return obj;
  
})

      </script>
