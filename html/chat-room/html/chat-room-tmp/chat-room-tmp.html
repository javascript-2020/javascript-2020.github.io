

<chat-room-tmp>

      <template shadowrootmode=open>
      
      
            <style>
            
  #user-root
    {height:150px;display:flex;gap:20px;border-top:1px solid lightgray;padding-top:10px}
  #txt
    {height:100%;border:1px solid lightgray;border-radius:5px;padding:10px;flex:1;box-sizing:border-box;resize:none}
  #info
    {display:flex;flex-direction:column;gap:10px}
  #show-password
    {cursor:pointer}
  #show-password > *
    {vertical-align:middle;cursor:pointer}
  .label
    {display:inline-block;width:100px;text-align:right;margin-right:20px}
    
  [value=send]
    {margin-right:20px;min-width:80px}
  #pause
    {min-width:80px}
    
    
  input
    {font-size:16px;padding:5px 10px}
  input[type=button]
    {cursor:pointer}
  input[type=checkbox]
    {width:15px;height:15px;margin:0}
  textarea
    {font-size:16px}
    
    
            </style>
            
            
            <section id=user-root>
            
                  <div id=info>
                        <div>
                              <span class=label>
                                    user
                              </span>
                              <input id=user value=test>
                        </div>
                        <div>
                              <span class=label>
                                    password
                              </span>
                              <input id=password type=password value=abc-123>
                        </div>
                        <div id=show-password>
                              <span class=label>
                                    show
                              </span>
                              <input type=checkbox>
                        </div>
                        
                  </div>
                  
                  <textarea id=txt></textarea>
                  
                  <div id=btns>
                        <input value=send type=button title=ctrl+enter>
                        <input id=pause value=pause type=button>
                  </div>
                  
            </section>
            
            
      </template>
      
      
      <script>
      
(function({mod,host}){

  var obj   = {};
  
        var df=true,did='chat-room-tmp';
        
        
        var debug,$,post,poll
        ;
        
        obj.initmod   = function(params){
        
              debug       = mod.rd(params,'debug',debug);
              $           = mod.rd(params,'$',$);
              post        = mod.rd(params,'post',post);
              poll        = mod.rd(params,'poll',poll);
              
        }//initmod
        
        
  //:
  
        var ui        = {};
        
        
        var btn       = {};
        var kd        = {};
        
  //:
  
  
        obj.init    = async function(){
                                                                                debug=eval(debug.mod);
                                                                                debug('init');
        }//init
        
        
  //:
  
  
        obj.initdom   = async function(){
                                                                                debug('initdom');
              shadow                                      = host.shadowRoot;
              
              var info                                    = $(shadow,'#info');
              $.chkbox(info,'#show-password',btn.password);
              
              $(shadow,'#txt').onkeydown                  = kd.user;
              $(shadow,'#txt').focus();
              
              $(shadow,'[value=send]').onclick            = btn.send;
              ui.pause                                    = $(shadow,'[value=pause]');
              ui.pause.onclick                            = btn.pause;
              
              
        }//initdom
        
        
  //:
  
  
        btn.password    = function(){
        
              $(shadow,'#txt').focus();
              
              var node    = $(shadow,'#password');
              if(node.getAttribute('type')=='password'){
                    node.removeAttribute('type');
              }else{
                    node.setAttribute('type','password');
              }
              
        }//password
        
        
        kd.user   = function(e){
                                                                                //console.log(e.ctrlKey,e.key);
              if(e.ctrlKey && e.key=='Enter'){
                    btn.send();
              }
              if(e.ctrlKey && e.key==' '){
                    btn.pause();
              }
              
        }//user
        
        
        btn.send    = function(){
        
              $(shadow,'#txt').focus();
              
              var txt             = $(shadow,'#txt').value;
              $(shadow,'#txt').value     = '';
              var user            = $(shadow,'#user').value;
              var password        = $(shadow,'#password').value;
              
              post.msg({user,password,txt});
              
        }//send
        
        
        btn.pause   = function(){
        
              $(shadow,'#txt').focus();
              
              if(poll.abort){
                    ui.pause.value    = 'pause';
                    poll.abort        = false;
                    post.update.initial();
              }else{
                    ui.pause.value    = 'resume';
                    poll.abort        = true;
              }
              
        }//pause
        
        
        
  return obj;
  
//chat-room-tmp
})


      </script>
      
      
</chat-room-tmp>
