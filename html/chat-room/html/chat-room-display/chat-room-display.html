

<chat-room-display>

      <template shadowrootmode=open>
      
            <style>
            
  #title
    {font-size:14px;font-style:italic;color:gray;border-bottom:1px solid lightgray;padding:0 10px 10px;margin-bottom:10px}
    
  #view
    {flex:1;overflow:auto;display:flex;flex-direction:column;gap:10px}
  #view > div:nth-child(odd)
    {background: #f5f5f5}
  #view > div:nth-child(even)
    {background: #e0e0e0}
    
  #empty
    {font-size:20px;font-weight:bold;color:lightgray;background:transparent !important;text-align:center;padding:20px}
    
  .msg
    {display:flex;gap:30px;align-items:center;padding:10px 20px}
  .msg:hover
    {background:lightyellow !important}
    
  .msg .username
    {width:120px}
  .msg .txt
    {flex:1;white-space:pre}
  .msg .ts
    {font-family:monospace}
  .msg .del
    {content:url(data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAB4AAAAeBAMAAADJHrORAAAAJFBMVEVHcEzfIB/ZKyrcKSjcIB/gHh3cJiXhHh3hHRzhHRvbJybiHBvYPD9wAAAAC3RSTlMAuyBkVelW6enpVsZbFRsAAACuSURBVBjTZZE9EoIwEIXfIGMvLY3xBDaOLQ3jAXQsrGwcD6C34Ag0XoEO5l3OZJNFstJ8Q94X2B8AqwrxcXtBO2yFRf0OWHeMguN093iQIhQ1eQXKjhTBeU4NDh5BCDH5gsALTjgod3oePW6Y7iWBKYYKGi+FKtWZxT9B+0qCxn/vxrffM/+z9Zh6bT+2XzuPYzavM8p+Mc+xAZ6Led/CPvp5H+Mn8DTv6yLM9vkFA8yuIQSFYnAAAAAASUVORK5CYII=);
    }
  .msg .icons
    {width:60px}
  .msg .icons img
    {width:16px;height:16px;border:1px solid lightgray;border-radius:3px;padding:1px;box-sizing:border-box;cursor:pointer}
    
            </style>
            
            <div id=title>
                  messages
            </div>
            
            <section id=view >
                  <div id=empty>
                        Empty
                  </div>
                  
                  <div class=msg style='display:none'>
                        <div class=username>
                        </div>
                        <div class=txt>
                        </div>
                        <div class=ts>
                        </div>
                        <div class=icons>
                              <div style='display:none'>
                                    <img class=del>
                              </div>
                        </div>
                  </div>
                  
            </section>
            
            
      </template>
      
      <script>
      
(function({mod,host}){

  var obj   = {};
  
        var df=false,did='chat-room-display';
        
        var $,debug,poll,input,post
        ;
        
        obj.initmod   = function(params){
        
              debug       = mod.rd(params,'debug',debug);
              $           = mod.rd(params,'$',$);
              poll        = mod.rd(params,'poll',poll);
              input       = mod.rd(params,'input',input);
              post        = mod.rd(params,'post',post);
              
        }//initmod
        
        
  //:
  
  
        var msgs    = [];
        obj.msgs    = msgs;
        
        
        var shadow;
        var view;
        var empty;
        var msg;
        
        
        
        Object.defineProperty(obj,'last',{get:()=>msgs.at(-1)?.ts||null});
        
        
  //:
  
  
        obj.init    = async function(){
                                                                                debug=eval(debug.mod);
                                                                                debug('init');
        }//init
        
        
  //:
  
  
        obj.initdom   = async function(){
                                                                                debug('initdom');
              shadow                    = host.shadowRoot;
              
              view                      = $(shadow,'#view');
              empty                     = $(view,'#empty');
              msg                       = $(view,'.msg');
              msg.remove();
              msg.style.display         = '';
              
        }//initdom
        
        
  //:
  
  
        obj.node    = function(){return display.node.apply(null,arguments)}
        
        display.node    = function({msg_id}){
        
              var nmsg              = msg.cloneNode(true);
              nmsg.msg_id           = msg_id;
              nmsg.onmouseenter     = me;
              nmsg.onmouseleave     = ml;
              
              return nmsg;
              
              
              function me(e){
              
                    $(nmsg,'.icons>div').style.display    = '';
                    
              }//me
              
              
              function ml(e){
              
                    $(nmsg,'.icons>div').style.display    = 'none';
                    
              }//ml
              
        }//node
        
        
        obj.result    = function(){return display.result.apply(null,arguments)}
        
        display.result    = function({list}){
        
              display.list(list)
              
              if(msgs.length!=0){
                    empty.remove();
              }
              
        }//result
        
        
        obj.list      = function(){return display.list.apply(null,arguments)}
        
        display.list    = function(list){
                                                                                console.json(list);
              list.forEach(item=>{
              
                    var result    = msgs.find(msg=>msg.msg_id===item.msg_id);
                    if(result)return;
                    
                    var insert    = false;
                    var n         = msgs.length;
                    for(var i=0;i<n;i++){
                    
                          var msg   = msgs[i];
                          if(msg.ts>item.ts){
                                insert    = msg;
                                msgs.splice(i,0,item);
                                break;
                          }
                          
                    }//for
                    if(!insert){
                          msgs.push(item);
                    }
                    
                    var node    = display(item,insert?.node);
                    item.node   = node;
                    
              });
                                                                                //console.json(msgs);
        }//list
        
        
        function display(data,insert){
        
              var m_type            = data.m_type;
              var node              = input[m_type].display(data);
              if(node){
                    view.insertBefore(node,insert);
              }
              return node;
              
        }//display
        
        
        
        
        
        
        
  return obj;
  
//chat-room-display
})

      </script>
      
</chat-room-display>
