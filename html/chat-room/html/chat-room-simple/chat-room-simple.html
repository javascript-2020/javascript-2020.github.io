      <script>
      
(function({mod,host}){

  var obj   = {};
  
        var df=true,did='chat-room-simple';
        
        
        var debug,$,post,poll,display,room_id,ls
        ;
        
        obj.initmod   = function(params){
        
              debug       = mod.rd(params,'debug',debug);
              $           = mod.rd(params,'$',$);
              post        = mod.rd(params,'post',post);
              poll        = mod.rd(params,'poll',poll);
              display     = mod.rd(params,'display',display);
              room_id     = mod.rd(params,'room_id',room_id);
              ls          = mod.rd(params,'ls',ls);
              
        }//initmod
        
        
  //:
  
        var def   = {
              username    : 'test',
              password    : 'test-123'
        };
        
        var shadow;
        
        var ui        = {};
        
        
        
        var btn       = {};
        var kd        = {};
        var disp      = {};
        var send      = {};
        
        
  //:
  
  
        obj.init    = async function(){
                                                                                debug=eval(debug.mod);
                                                                                debug('init');
        }//init
        
        
  //:
  
  
        obj.initdom   = async function(){
                                                                                debug('initdom');
              shadow                                      = host.shadowRoot;
              
              
              var info                                    = $(shadow,'#info');
              console.log(ls);
              var str                                     = ls.read('username')||def.username;
              $(info,'#username').value                   = str;
              
              var str                                     = ls.read('password')||def.password;
              $(info,'#password').value                   = str;
              $(info,'#show').onclick                     = btn.password;
              
              $(shadow,'#txt').onkeydown                  = kd.txt;
              $(shadow,'#txt').focus();
              
              $(shadow,'[value=send]').onclick            = btn.send;
              ui.pause                                    = $(shadow,'[value=pause]');
              ui.pause.onclick                            = btn.pause;
              
              
        }//initdom
        
        
  //:
  
  
        btn.password    = function(){
        
              $(shadow,'#txt').focus();
              
              var node    = $(shadow,'#password');
              if(node.getAttribute('type')=='password'){
                    node.removeAttribute('type');
              }else{
                    node.setAttribute('type','password');
              }
              
        }//password
        
        
        kd.txt   = function(e){
                                                                                //console.log(e.ctrlKey,e.key);
              if(e.ctrlKey && e.key=='Enter'){
                    btn.send();
              }
              if(e.ctrlKey && e.key==' '){
                    btn.pause();
              }
              
        }//user
        
        
        btn.send    = function(){
        
              $(shadow,'#txt').focus();
              
              var txt                   = $(shadow,'#txt').value;
              $(shadow,'#txt').value    = '';
              var username              = $(shadow,'#username').value;
              var password              = $(shadow,'#password').value;
              var ts                    = display.last;
              
              send.msg({username,password,txt,ts});
              
        }//send
        
        
        btn.pause   = function(){
        
              $(shadow,'#txt').focus();
              
              if(poll.abort){
                    ui.pause.value    = 'pause';
                    poll.abort        = false;
                    post.update.initial();
              }else{
                    ui.pause.value    = 'resume';
                    poll.abort        = true;
              }
              
        }//pause
        
        
        obj.focus   = function(){
        
              $(shadow,'#txt').focus();
              
        }//focus
        
        
  //:
  
  
  
        obj.display   = function(data){
        
              var type    = data.type;
              var node    = disp[type](data);
              return node;
              
        }//display
        
        
        disp.message   = function(data){
        
              var {msg_id,username,txt,ts}   = data;
              
              var config          = {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false};
              var format          = new Intl.DateTimeFormat(undefined,config);
              
              var err;
              try{
              
                    ts            = Number(ts);
                    var local     = format.format(new Date(ts));
                    var parts     = local.split(',');
                    local         = parts[2]+'  '+parts[0]+parts[1];
                    
              }//try
              catch(err2){
              
                    err   = err2;
                    
              }//catch
              if(err){
                                                                                console.log(name,txt,ts);
                                                                                console.log(err);
                    local   = err.toString();
              }
              
              
              var nmsg                            = display.node(data);
              
              $(nmsg,'.username').textContent     = username;
              $(nmsg,'.txt').textContent          = txt;
              $(nmsg,'.ts').textContent           = local;
              $(nmsg,'.del').onclick              = e=>del(data);
              
              return nmsg;
              
              
              function del(){
              
                    var name        = $(shadow,'#username').value;
                    if(username!==name){
                          log.red('invalid username');
                          return;
                    }
                    
                    var password        = $(shadow,'#password').value;
                    var del_id          = msg_id;
                    var ts              = display.last;
                    send.del({username,password,del_id,ts});
                    
              }//del
              
        }//display
        
        
        disp.delete    = function({del_id}){
                                                                                console.log('delete',del_id);
              var item    = msgs.find(data=>data.msg_id===del_id);
              if(!item)return;
              $(item.node,'.txt').textContent   = 'deleted';
              
        }//delete
        
        
  //:
  
  
        send.del    = async function({username,password,del_id,ts}){
        
              var result      = await post('simple/del',{room_id,username,password,del_id,ts});
              if(!result)return;
              display.result(result);
              
        }//del
        
        
        send.msg    = async function({username,password,txt,ts}){
                                                                                //console.log('post.msg');
              var result      = await post('simple/msg',{room_id,username,password,txt,ts});
              if(!result)return;
              display.result(result);
              
        }//msg
        
        
        
        
        
        
  return obj;
  
//chat-room-simple
})
