

<chat-room-open>

      <template shadowrootmode=open>
      
      
            <style>
            
  #input-root
    {height:150px;display:flex;gap:20px;border-top:1px solid lightgray;padding-top:10px}
    
  #txt
    {height:100%;border:1px solid lightgray;border-radius:5px;padding:10px;flex:1;box-sizing:border-box;resize:none;outline:none}
    
  #info
    {display:flex;flex-direction:column;gap:10px}
    
    
  .label
    {display:inline-block;width:100px;text-align:right;margin-right:20px}
    
  [value=send]
    {margin-right:20px;min-width:80px}
    
  #pause

  input

  input[type=button]
    {cursor:pointer}
  input[type=checkbox]
    {width:15px;height:15px;margin:0}
  textarea
    {font-size:16px}
    
    
  .icon
    {border:1px solid gray;border-radius:3px;box-sizing:border-box;width:30px;height:30px;cursor:pointer}
    
    
            </style>
            
            
            <section id=input-root>
            
                  <div id=info>
                  </div>
                  
                  <textarea id=txt></textarea>
                  
                  <div id=btns>
                        <input value=send type=button title=ctrl+enter>
                        <input id=pause value=pause type=button>
                  </div>
                  
            </section>
            
            
      </template>
      
      
      <script>
      
(function({mod,host}){

  var obj   = {};
  
        var df=true,did='chat-room-open';
        
        
        var debug,$,post,poll,display,room_id
        ;
        
        obj.initmod   = function(params){
        
              debug       = mod.rd(params,'debug',debug);
              $           = mod.rd(params,'$',$);
              post        = mod.rd(params,'post',post);
              poll        = mod.rd(params,'poll',poll);
              display     = mod.rd(params,'display',display);
              room_id     = mod.rd(params,'room_id',room_id);
              
        }//initmod
        
        
  //:
  
  
        var shadow;
        
        var ui        = {};
        
        
        var btn       = {};
        var kd        = {};
        var disp      = {};
        var send      = {};
        
        
  //:
  
  
        obj.init    = async function(){
                                                                                debug=eval(debug.mod);
                                                                                debug('init');
        }//init
        
        
  //:
  
  
        obj.initdom   = async function(){
                                                                                debug('initdom');
              shadow                                      = host.shadowRoot;
              
              var info                                    = $(shadow,'#info');
              
              $(shadow,'#txt').onkeydown                  = kd.txt;
              $(shadow,'#txt').focus();
              
              $(shadow,'[value=send]').onclick            = btn.send;
              ui.pause                                    = $(shadow,'[value=pause]');
              ui.pause.onclick                            = btn.pause;
              
              
        }//initdom
        
        
  //:
  
  
        kd.txt   = function(e){
                                                                                //console.log(e.ctrlKey,e.key);
              if(e.ctrlKey && e.key=='Enter'){
                    btn.send();
              }
              if(e.ctrlKey && e.key==' '){
                    btn.pause();
              }
              
        }//user
        
        
        btn.send    = function(){
        
              var txt                   = $(shadow,'#txt').value;
              var ts                    = display.last;
              
              send.msg({txt,ts});
              
              $(shadow,'#txt').value    = '';
              $(shadow,'#txt').focus();
              
        }//send
        
        
        btn.pause   = function(){
        
              $(shadow,'#txt').focus();
              
              if(poll.abort){
                    ui.pause.value    = 'pause';
                    poll.abort        = false;
                    post.update.initial();
              }else{
                    ui.pause.value    = 'resume';
                    poll.abort        = true;
              }
              
        }//pause
        
        
        obj.focus   = function(){
        
              $(shadow,'#txt').focus();
              
        }//focus
        
        
  //:
  
  
        obj.display   = function(data,nmsg){
        
              var type      = data.type;
              var result    = disp[type](data,nmsg);
              return result;
              
        }//display
        
        
        disp.message    = function(data){
        
              var {msg_id,txt,ts}   = data;
              
              var config          = {day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false};
              var format          = new Intl.DateTimeFormat(undefined,config);
              
              var err;
              try{
              
                    ts            = Number(ts);
                    var local     = format.format(new Date(ts));
                    var parts     = local.split(',');
                    local         = parts[2]+'  '+parts[0]+parts[1];
                    
              }//try
              catch(err2){
              
                    err   = err2;

              if(err){

                    local   = err.toString();
              }
              
              
              var nmsg                            = msg.cloneNode(true);
              $(nmsg,'.txt').textContent          = txt;
              $(nmsg,'.ts').textContent           = local;
              $(nmsg,'.del').onclick              = e=>del(data);
              
              return nmsg;
              
        }//message
        
        
        disp.del    = function({del_id}){
        
              var item    = msgs.find(data=>data.msg_id===del_id);
              if(!item)return;
              $(item.node,'.txt').textContent   = 'deleted';
              
        }//del
        
        
        
  //:
  
  
        send.msg    = async function({txt,ts}){
                                                                                //console.log('post.msg');
              var result      = await post('open/msg',{room_id,txt,ts});
              if(!result)return;
              display.result(result);
              
        }//send
        
        
        
        
        
  return obj;
  
//chat-room-open
})


      </script>
      
      
</chat-room-open>
