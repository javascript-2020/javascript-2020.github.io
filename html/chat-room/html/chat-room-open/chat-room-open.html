

<chat-room-open>

      <template shadowrootmode=open>
      
      
            <style>
            
  #input-root
    {height:150px;display:flex;gap:20px;border-top:1px solid lightgray;padding-top:10px}

    {height:100%;border:1px solid lightgray;border-radius:5px;padding:10px;flex:1;box-sizing:border-box;resize:none;outline:none}

  textarea

                  </div>
                  
            </section>
            
            
      </template>

(function({mod,host}){

              $           = mod.rd(params,'$',$);

              poll        = mod.rd(params,'poll',poll);
              display     = mod.rd(params,'display',display);

        var kd        = {};
        
        
  //:
  
  
        obj.init    = async function(){
                                                                                debug=eval(debug.mod);
                                                                                debug('init');
        }//init
        
        
  //:
  
  
        obj.initdom   = async function(){
                                                                                debug('initdom');
              shadow                                      = host.shadowRoot;
              
              var info                                    = $(shadow,'#info');
              
              $(shadow,'#txt').onkeydown                  = kd.txt;
              $(shadow,'#txt').focus();
              
              $(shadow,'[value=send]').onclick            = btn.send;
              ui.pause                                    = $(shadow,'[value=pause]');
              ui.pause.onclick                            = btn.pause;
              
              
        }//initdom
        
        
  //:
  
  
        kd.txt   = function(e){
                                                                                //console.log(e.ctrlKey,e.key);
              if(e.ctrlKey && e.key=='Enter'){
                    btn.send();
              }
              if(e.ctrlKey && e.key==' '){
                    btn.pause();
              }
              
        }//user
        
        
        btn.send    = function(){
        
              $(shadow,'#txt').focus();
              
              var txt             = $(shadow,'#txt').value;
              $(shadow,'#txt').value     = '';
              
              msg.send({username,password,txt});
              
        }//send
        
        
        btn.pause   = function(){
        
              $(shadow,'#txt').focus();
              
              if(poll.abort){
                    ui.pause.value    = 'pause';
                    poll.abort        = false;
                    post.update.initial();
              }else{
                    ui.pause.value    = 'resume';
                    poll.abort        = true;
              }
              
        }//pause
        
        
  //:
  
  
        obj.display   = function(data){
        }//display
        
        
        obj.del   = function(){
        
              log.red('open messages cannot be deleted');
              
        }//del
        
        
        async function send({}){
        }//send
        
        
        
  return obj;
  
//chat-room-open
})


      </script>
      
      
</chat-room-open>
