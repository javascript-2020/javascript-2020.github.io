

<chat-room-hdr>

      <template shadowrootmode=open>
      
            <style>
            
  #hdr
    {}
  #title
    {text-align:center;font-size:20px;font-weight:bold;color:gray;text-align:center;padding:20px}
    
            </style>
            
            
            <section id=hdr>
            
                  <div id=title>
                  </div>
                  
            </section>
            
            
      </template>
      
      
      <script>
      
(function({mod,host}){

  var obj   = {};
  
        var df=false,did='chat-room-hdr';
        
        var debug
        ;
        
        obj.initmod   = function(params){
        
              debug   = mod.rd(params,'debug',debug);
              
        }//initmod
        
        
  //:
  
  
        var ui    = {};
        
        
  //:
  
  
        obj.init    = async function(){
                                                                                debug=eval(debug.mod);
                                                                                debug('init');
        }//init
        
        
  //:
  
  
        obj.initdom   = async function(){
                                                                                debug('initdom');
              shadow    = host.shadowRoot;
              
              ui.title    = $(shadow,'#title');
              
              
              
        }//initdom
        
        
  //:
  
  
        obj.title   = function(title){
        
              $(ui.title).textContent   = title;
              
        }//title
        
        
        
        
  return obj;
  
//chat-room-hdr
})

      </script>
      
</chat-room-hdr>
