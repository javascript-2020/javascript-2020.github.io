

<chat-room>

      <template shadowrootmode=open>
      
            <style>
            
  :host
    {display:flex;flex-direction:column;gap:10px}
    
  chat-room-display
    {flex:1}
    
            </style>
            
            <chat-room-hdr component=parent></chat-room-hdr>
            
            <chat-room-display component=parent></chat-room-display>
            
            <slot></slot>
            
      </template>
      
      <script>
      
(function({mod,host}){

  var obj   = {
        [Symbol.toStringTag]    : 'chat-room',
        version                 : 'v1.0',
  };
  
        var df=true,did='chat-room';
        
        
        var debug,input
        ;
        
        obj.initmod   = function(params){
        
              debug       = mod.rd(params,'debug',debug);
              input       = mod.rd(params,'input',input);
              
        }//initmod
        
        
  //:
  
  
        var hdr;
        var display;
        var input;
        
        var server    = '';
        var room_id   = 'main';
        
        var poll    = {
                            abort   : false,
                            time    : 2000,
                            min     : 2000,
                            timer   : null,
                      };
                      
                      
                      
        var rd        = {};
        rd.attr       = {};
        
        
  //:
  
  
        obj.init    = async function(){
                                                                                debug=eval(debug.mod);
                                                                                debug('init');
              hdr           = mod['chat-room-hdr'];
              display       = mod['chat-room-display'];
              
              hdr.df=display.df=input.df=df;
              display.initmod({poll,post,input});
              input.initmod({post,poll});
              
              
              await mod.auto();
              
              
        }//init
        
        
  //:
  
  
        rd.attr.server    = function(){
        
              if(!target.hasAttribute('server'))return;
              server    = target.getAttribute('server');console.log('rd.attr.server',server);
              
        }//server
        
        
        rd.attr.room    = function(){
        
              if(!target.hasAttribute('room'))return;
              room    = target.getAttribute('room');
              
        }//room
        
        
        rd.attr['poll-time']    = function(){
        
              if(!target.hasAttribute('poll-time'))return;
              var str   = target.getAttribute('poll-time');
              if(int(str)){
                    var num   = Number(str);
                    if(num<poll.min){
                          num   = poll.min;
                    }
                    polltime    = num;
              }
              
        }//poll-time
        
        
  //:
  
  
        obj.initdom   = async function(){
        
              post.start();
              
        }//initdom
        
        
  //:
  
  
        post.list   = [];
        
        
        async function post(path,json){
        
              clearTimeout(post.timer);
              var resolve,promise=new Promise(res=>resolve=res);
              
              if(post.pending){
                    post.list.push([arguments,resolve]);
              }else{
                    post.send(arguments,resolve);
              }
              
              return promise;
              
        }//post
        
        
        post.send   = async function([path,json],resolve){
        
              post.pending      = true;
              var url           = server+path;
              var body          = JSON.stringify(json);
              var headers       = {};
                                                                          debug(url,body);
              var err;
              try{
              
                    var res   = await fetch(url,{headers,method:'post',body});
                    
              }//try
              catch(err2){
              
                    err   = err2;
                    
              }//catch
              if(err){
                    var error   = err.toString();
                    log.red(error);
                    exit();
                    return;
              }
              if(!res.ok){
                    var txt     = await res.text();
                    var error   = `${res.status} ${res.statusText||txt}`;
                                                                          console.log(error);
                                                                          console.log(txt);
                    log.red(error);
                    exit();
                    return;
              }
              
              var result    = await res.json();
              if(result.error){
                    log.red(result.error);
                    exit();
                    return;
              }
              exit(result);
              
              
              function exit(result){
                                                                          //console.log(4);
                    post.pending    = false;
                    resolve(result);
                    
                    if(post.list.length){
                          var args;
                          [args,resolve]    = post.list.shift();
                          post.send.call(null,args,resolve);
                          return;
                    }
                    
                    if(result){
                          post.update.initial();
                    }
                    
              }//exit
              
        }//send
        
        
        post.start    = async function(){
        
              var result    = await post('simple/start',{room_id});
              if(!result)return;
              
              display.result(result);
              
              post.update.initial();
              
        }//start
        
        
        post.msg    = async function({user,password,txt}){
                                                                                //console.log('post.msg');
              var ts          = display.last;
              var result      = await post('simple/msg',{room_id,user,password,txt,ts});
              if(!result)return;
              
              display.result(result);
              
        }//msg
        
        
        post.del    = async function({id,password}){
        
              var ts          = display.last;
              var result      = await post('simple/del',{room_id,id,password,ts});
              if(!result)return;
              
              display.result(result);
              
        }//del
        
        
        post.update   = async function(){
        
              var ts          = display.last;
              var result      = await post('simple/update',{room_id,ts});
              if(!result)return;
              
              display.result(result);
              
              if(poll.abort)return;
              
              post.timer    = setTimeout(post.update,poll.time);
              
        }//update
        
        
        post.update.initial   = function(){
        
              if(poll.abort)return;
              if(!Number.isFinite(poll.time))return;
              post.timer    = setTimeout(post.update,poll.time);
              
        }//initial
        
        
        
        
        
        
        
        
        
        
  return obj;
  
//chat-room
})

      </script>
      
</chat-room>
