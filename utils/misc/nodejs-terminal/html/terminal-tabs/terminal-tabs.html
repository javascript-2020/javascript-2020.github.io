            <div id=tabs>
                  <div id=tab-icons>
                        <img id=tab-remove class=icon>
                        <img id=tab-add class=icon>
                  </div>
                  <div class=tab style='display:none'>
                  </div>
            </div>
            
            <div id=hldr>
            </div>
            
      </template>
      
      <script>
      
(function({mod,host}){

  var obj   = {
        version   : 'v1.0.0',
  };
  
        var df=true,did='terminal-tabs';
        
        var $,theme,Terminal,webcontainer,FitAddon,spinner;
        
        obj.initmod   = function(params){
        
              $               = mod.rd(params,'$',$);
              theme           = mod.rd(params,'theme',theme);
              Terminal        = mod.rd(params,'Terminal',Terminal);
              FitAddon        = mod.rd(params,'FitAddon',FitAddon);
              webcontainer    = mod.rd(params,'webcontainer',webcontainer);
              spinner         = mod.rd(params,'spinner',spinner);
              
              
        }//initmod
        
        
  //:
  
  
        var mem       = [];
        
        
        var shadow;
        
        var tabs;
        var tab;
        
        var hldr;
        
        var btn       = {};
        
        
  //:
  
  
        obj.init    = async function(){
        }//init
        
        
  //:
  
  
        obj.initdom   = async function(){
        
              shadow                                  = host.shadowRoot;
              
              tabs                                    = $(shadow,'#tabs');
              tab                                     = $(tabs,'.tab');
              tab.remove();
              tab.style.display                       = '';
              
              $(tabs,'#tab-remove').onclick           = btn['tab-remove'];
              $(tabs,'#tab-add').onclick              = btn['tab-add'];
              
              
              hldr                                    = $(shadow,'#hldr');
              hldr.style.background                   = theme.light.background;
              
              
              
        }//initdom
        
        
  //:
  
  
        btn['tab-remove']   = function(){
        }//tab-remove
        
        
        btn['tab-add']    = async function(){
        
              add();
              
        }//tab-add
        
        
        
  //:
  
  
        obj.add   = add;
        
        async function add(){
        
              var ntab        = tab.cloneNode(true);
              tabs.append(ntab);
              
              var terminal    = await mod.component('webcontainer-terminal',{component:'page'},{par:hldr,auto:false});
              terminal.initmod({Terminal,webcontainer,FitAddon,spinner,theme,tab:ntab});
              await terminal.init();
              await terminal.initdom();
              
              var view        = {tab:ntab,terminal};
              mem.push(view);
              show(view);
              
        }//add
        
        
        obj.remove    = remove;
        
        function remove(){
        }//remove
        
        
        function show(view){
        
              mem.forEach(view=>{
              
                    view.tab.classList.remove('active');
                    view.tab.classList.add('inactive');
                    view.terminal.hide();
                    
              });
              
              view.tab.classList.remove('inactive');
              view.tab.classList.add('active');
              view.terminal.show();
              
        }//show
        
        
  //:
  
  return obj;
  
//terminal-tabs
})

      </script>
      
</terminal-tabs>
