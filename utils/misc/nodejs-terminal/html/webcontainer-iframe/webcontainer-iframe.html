<webcontainer-iframe>

      <template shadowrootmode=open>
      
            <style>
            
  #root
    {display:flex;flex-direction:column;gap:5px;padding:10px}
    
  #hdr
    {display:flex;align-items:center;gap:10px}
    
  #url
    {flex:1}
    
  #hldr
    {flex:1;position:relative}
    
  iframe
    {width:100%;height:100%;border:none}
    
  #glass
    {position:absolute;left:0;top:0;width:100%;height:100%;background:lightblue;opacity:0.2}
    
  input
    {font-size:16px;padding:5px 10px;box-sizing:border-box}
    
  input[type=button]
    {cursor:pointer}
    
    
            </style>
            
            
            <div id=root>
            
                  <div id=hdr>
                  
                        <div>
                        </div>
                        
                        <div>
                              url
                        </div>
                        <input id=url>
                        
                        <div>
                        </div>
                        
                  </div>
                  
                  <div id=hldr>
                  
                        <iframe></iframe>
                        <div id=glass style='display:none'></div>
                        
                  </div>
                  
            </div>
            
            
      </template>
      
      
      <script>
      
      
(function({mod,host}){

  var obj   = {
        version   : 'v1.0',
  };
  
        var df=true,did=host.nodeName.toLowerCase()
        ;
        
        
        var $,debug,vm
        ;
        
        obj.initmod   = function(params){
        
              $           = mod.rd(params,'$',$);
              debug       = mod.rd(params,'debug',debug);
              vm          = mod.rd(params,'vm',vm);
              
        }//initmod
        
        
  //:
  
  
        var viewport;
        
        var ui    = {};
        ui.url    = null;
        ui.iframe   = null;
        var glass;
        var icons;
        
        
        var ku            = {};
        var callback      = {};
        
  //:
  
  
        obj.init    = function(){
                                                                                debug=eval(debug.mod);
                                                                                debug('init');
        }//init
        
        
  //:
  
  
        obj.initdom   = async function(){
        
              viewport                        = await vm.new();
              viewport.body.append(host);
              
              var shadow                      = host.shadowRoot;
              
              var root                        = $(shadow,'#root');
              
              ui.url                          = $(shadow,'#url');
              ui.url.onkeyup                  = ku.url;
              
              ui.iframe                       = $(shadow,'iframe');
              obj.iframe                      = ui.iframe;
              
              glass                           = $(shadow,'#glass');
              
              
              
        }//initdom
        
        
  //:
  
  
        ku.url    = function(e){
        
              switch(e.key){
              
                case 'Enter'    : ui.iframe.src    = ui.url.value;   break;
                
              }//switch
              
        }//url
        
        
  //:
  
  
        callback.drag   = function(e,dragtype){
                                                                                //debug('callback.drag',dragtype);
              if(dragtype=='drag-start'){
                    glass.style.display   = 'block';
              }
              if(dragtype=='drag-end'){
                    glass.style.display    = 'none';
              }
              
        }//drag
  //:
  
  
  return obj;
  
})


      </script>
      
<webcontainer-iframe>
