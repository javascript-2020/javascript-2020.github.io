      <script>
      
      
(function({mod,host}){

  var obj   = {
        version   : 'v1.0',
  };
  
        var df=true,did=host.nodeName.toLowerCase()
        ;
        
        
        var $,debug,vm
        ;
        
        obj.initmod   = function(params){
        
              $           = mod.rd(params,'$',$);
              debug       = mod.rd(params,'debug',debug);
              vm          = mod.rd(params,'vm',vm);
              
        }//initmod
        
        
  //:
  
  
        var viewport;
        obj.viewport        = null;
        
        var ui              = {};
        ui.url              = null;
        ui.iframe           = null;
        var glass;
        var icons;
        
        
        var ku              = {};
        var callback        = {};
        
  //:
  
  
        obj.init    = function(){
                                                                                debug=eval(debug.mod);
                                                                                debug('init');
        }//init
        
        
  //:
  
  
        obj.initdom   = async function(){
        
              viewport                        = await vm.new();
              obj.viewport                    = viewport;
              viewport.body.append(host);
              viewport.on.drag                = callback.drag;
              
              var shadow                      = host.shadowRoot;
              
              var root                        = $(shadow,'#root');
              
              ui.url                          = $(shadow,'#url');
              ui.url.onkeyup                  = ku.url;
              
              ui.iframe                       = $(shadow,'iframe');
              obj.iframe                      = ui.iframe;
              
              glass                           = $(shadow,'#glass');
              
              
              
        }//initdom
        
        
  //:
  
  
        ku.url    = function(e){
        
              switch(e.key){
              
                case 'Enter'    : ui.iframe.src    = ui.url.value;   break;
                
              }//switch
              
        }//url
        
        
  //:
  
  
        callback.drag   = function(e,dragtype){
                                                                                //debug('callback.drag',dragtype);
              if(dragtype=='drag-start'){
                    glass.style.display   = 'block';
              }
              if(dragtype=='drag-end'){
                    glass.style.display    = 'none';
              }
              
        }//drag
  //:
  
  
  return obj;
  
})


      </script>
