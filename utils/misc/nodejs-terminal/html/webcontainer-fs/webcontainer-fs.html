      <script>
      
(function({mod,host}){

  var obj   = {
        version   : '1.0',
  };
  
        var df=true,did='webcontainer-fs'
        ;
        
        var ext,$,menu,source,webcontainer,log,debug,complete
        ;
        
        
        obj.initmod   = function(params){
        
              ext                 = mod.rd(params,'ext',ext);
              $                   = mod.rd(params,'$',$);
              menu                = mod.rd(params,'menu',menu);
              source              = mod.rd(params,'source',source);
              webcontainer        = mod.rd(params,'webcontainer',webcontainer);
              log                 = mod.rd(params,'log',log);
              debug               = mod.rd(params,'debug',debug);
              complete            = mod.rd(params,'complete',complete);
              
        }//initmod
        
        
  //:
  
  
        var filetype    = host.nodeName.toLowerCase();
        
        
        var filenav;
        
        var shadow;
        var icon;
        
        
        
        var btn     = {};
        var file    = {};
        var dir     = {};
        
        
  //:
  
  
        obj.init    = async function(){
                                                                                debug=eval(debug.mod);
                                                                                debug('init');
                                                                                console.log(host.nodeName);
                                                                                
              filenav   = mod['file-nav'];
              
              filenav.file    = file;
              filenav.dir     = dir;
              
              
              await mod.auto();
              
              
        }//init
        
        
  //:
  
  
        obj.initdom   = function(){
        
              shadow    = host.shadowRoot;
              
              
              menu.add.style(shadow);
              
              var style                       = $(shadow,'style');
              $.stylesheet.insert(style,'.icon');
              
              var mroot                       = $(shadow,'.menu');
              menu.input.norm(mroot);
              
              icon                            = $(shadow,'.icon');
              icon.onclick                    = menu.click(mroot,'both',false,menu_callback);
              
              
              
              var btns                              = $(shadow,'#btns');
              $(btns,'[value=update]').onclick      = btn.update;
              $(btns,'[value=load]').onclick        = btn.load;
              $(btns,'[value=save]').onclick        = btn.save;
              $(btns,'[value=cancel]').onclick      = btn.cancel;
              $(btns,'[value=ok]').onclick          = btn.ok;
              
              
              
        }//initdom
        
        
  //:
  
  
        btn.update    = function(){
        
              read();
              
        }//update
        
        
        btn.load    = function(){
        }//load
        
        
        btn.save    = function(){
        }//save
        
        
        btn.cancel    = function(){
        
              menu.close();
              
        }//cancel
        
        
        btn.ok    = function(){
        }//ok
        
        
  //:
  
  
        function menu_callback(type){
        
              switch(type){
              
                case 'show'   : read();       break;
                
              }//switch
              
        }//menu_callback
        
        
        async function read(path){
                                                                                debug('dir.read');
              path        ||= filenav.path;
              
              //var len       = prefix.length+path.length;
              
              var dirs      = [];
              var files     = [];
              
              
              var list    = await webcontainer.fs.readdir(path,{withFileTypes:true})
              
              list.forEach(item=>{
              
                    if(item.isFile()){
                          files.push(item.name);
                    }
                    if(item.isDirectory()){
                          dirs.push(item.name);
                    }
                    
              });
                                                                                //console.log(dirs);
                                                                                //console.log(files);
              filenav.display(path,dirs,files);
              return false;
              
        }//read
        
        
  //:
  
  
        file.click    = function(path,filename){
                                                                                debug('file.click',path,filename);
        }//click
        
        
        file.dblclick   = function(path,name){
                                                                                debug('file.dblclick',path,filename);
              var file        = {};
              file.type       = filetype;
              file.filename   = name;
              file.title      = abs;
              file.icon       = icon.src;
              file.abs        = abs;
              
              complete.load(file,blob);
              
        }//dblclick
        
        
        
        file.add    = async function(path,name){
                                                                                debug('file.add',path,name);
              var abs     = path+name;
                                                                                debug(abs);
              await webcontainer.fs.writeFile(abs,'');
              
              return false;
              
        }//add
        
        
        file.rem    = async function(path,name){
                                                                                debug('file.rem',path,name);
              var abs       = path+name;
                                                                                debug(abs);
              await webcontainer.fs.rm(abs);
              
              return false;
              
        }//rem
        
        
        file.upload   = async function(path,name,blob){
                                                                                debug('file.upload',path,name,blob);
              var abs     = path+name;
              
              var buf     = await blob.arrayBuffer();
              var uint8   = new Uint8Array(buf);
              await webcontainer.fs.writeFile(abs,uint8);
              
              return false;
              
        }//upload
        
        
        file.download   = async function(path,name){
                                                                                debug('file.download',path,name);
              var abs         = path+name;
              
              var uint8       = await webcontainer.fs.readFile(abs);
              var blob        = new Blob([uint8]);
              
              var url         = window.URL.createObjectURL(blob);
              var a           = document.createElement('a');
              a.href          = url;
              a.download      = name;
              a.click();
              
              return false;
              
        }//download
        
        
        
  //:
  
  
  
  
        dir.parent    = function(){
                                                                                debug('dir.parent');
        }//parent
        
        
        dir.add   = async function(path,name){
                                                                                debug('dir.add',path,name);
              var abs     = path+name+'/';
                                                                                debug(abs);
              await webcontainer.fs.mkdir(abs);
              
              return false;
              
        }//add
        
        
        dir.rem   = async function(path,name){
                                                                                debug('dir.rem',path,name);
              var abs     = path+name;
              
              await webcontainer.fs.rm(abs);
              
              return false;
              
        }//rem
        
        
        dir.clear   = async function(path){
                                                                                debug('dir.clear',path);
              return false;
              
        }//clear
        
        
        dir.read    = read;
        
        
        dir.dblclick    = function(path,name){
                                                                                debug('dir.dblclick',path,name);
              var abs   = path+name;
              
              read(path+name);
              
              return false;
              
        }//dblclick
        
        
        
  //:

  return obj;
  
})
