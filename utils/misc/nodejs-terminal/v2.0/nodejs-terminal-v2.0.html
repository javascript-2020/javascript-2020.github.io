        var version='v2.0';

  //:
  
  
        async function init(){
        
        
              menu    = menumod();
              
              mod.base.add({ext,$,datatype,keydown,menu,menumod});
              
              
              misc      = mod['misc-hdr'];
              filemod   = mod['file-mod'];
              wcfs      = mod['webcontainer-fs'];
              log       = mod['log-mod'];
              
              misc.initmod({ext,$});
              filemod.initmod({ext,$,menumod,menu,complete,source,log});
              wcfs.initmod({ext,$,menumod,menu,complete,source,log,debug,webcontainer});
              log.initmod({ext,$});
              
              
              await Promise.all([
                    misc.init(),
                    filemod.init(),
                    wcfs.init(),
                    log.init(),
              ]);
              
              
              initdom();
              
              
              
        }//init
        
        
        
(async()=>{

        mod.stack.add;
        
        ({ext}    = await import('https://libs.ext-code.com/js/io/ext-loader/ext-loader.m.js'));
        
        var promise   = ext.load.libs(
              'js/dom/$.js.api',
              'js/core/datatype.js',
              'js/dom/menumod/menumod.js',
              'js/dom/keydown/keydown.js',
              'js/debug/debug.js',
              'js/string/hs.js',
        );
        [$,datatype,menumod,keydown,debug,hs]   = await promise;
        
        mod.stack.complete;
        
})();

      <script>
      
      
        var cur         = {};
        
        
        var term;
        var webcontainer;
        var shell;
        
        
        var btn         = {};
        var ui          = {};
        var complete    = {};
        
        
  //:
  
        function initdom(){
        
        
              misc.initdom();
              misc.set.version(version);
              
              filemod.initdom();
              wcfs.initdom();
              
              
              $('#hldr').style.background   = theme.light.background;
              
              
              $('[value=test]').onclick    = btn.test;
              
              log.initdom();
              
              
              ui.info();
              
              
        }//initdom
        
        
  //:
  
  
        btn.test    = async function(){console.log('test');
        
              var list    = await webcontainer.fs.readdir('/',{withFileTypes:true});
              list.forEach(item=>{
              
                    console.log(item.name,item.isFile());
                    
              });
              
              
        }//test
        
        
  //:
  
  
        ui.info   = function(){
        
              var str   = 'none';
              if(cur.file){
                    str   = cur.file.name;
              }
              $('#hdr #filename').textContent   = str;
              
              var str   = '';
              if(cur.blob){
                    str   = hs(cur.blob.size);
              }
              $('#hdr #size').textContent   = str;
              
        }//info
        
        
  //:
  
  
        function source(){
        
              return cur.blob;
              
        }//source
        
        
        complete.load   = function(file,blob){
        
        
              cur.file    = file;
              cur.blob    = blob;
              ui.info();
              
        }//load
        
        
        complete.save   = function(file,confirm){
        
              if(confirm){
                    log.green(file.name+' saved');
              }
              
        }//save
        
        
  //:
  
  
        var theme   = {};
        
        theme.light   = {
              foreground            : 'black',//'#53676d',
              background            : 'hsl(45,86%,98%)',//'#fbf3db',
              cursor                : '#3a4d53',
              selectionBackground   : '#cfcebe',
              black                 : '#e9e4d0',
              red                   : '#d2212d',
              green                 : '#489100',
              yellow                : '#ad8900',
              blue                  : '#0072d4',
              magenta               : '#8f0075',
              cyan                  : '#00938d',
              white                 : '#ffffff',
              brightBlack           : '#7d7a68',
              brightRed             : '#d2212d',
              brightGreen           : '#489100',
              brightYellow          : '#ad8900',
              brightBlue            : '#0072d4',
              brightMagenta         : '#8f0075',
              brightCyan            : '#00938d',
              brightWhite           : '#ffffff'
        };
        
        
        var x   = {
        
              reset                 : '\x1b[0m',
              
              black                 : '\x1b[30m',
              red                   : '\x1b[31m',

              cyan                  : '\x1b[36m',
              white                 : '\x1b[37m',
              
              brightBlack           : '\x1b[90m',
              brightRed: '\x1b[91m',
              brightGreen: '\x1b[92m',
              brightYellow: '\x1b[93m',
              brightBlue: '\x1b[94m',
              brightMagenta: '\x1b[95m',
              brightCyan: '\x1b[96m',
              brightWhite: '\x1b[97m',
              
              bgRed: '\x1b[41m',
              bgGreen: '\x1b[42m',
              bgYellow: '\x1b[43m',
              bgBlue: '\x1b[44m',
              bgMagenta: '\x1b[45m',
              bgCyan: '\x1b[46m',
              bgWhite: '\x1b[47m',
              
              bgBrightRed       : '\x1b[101m',
              bgBrightGreen     : '\x1b[102m',
              bgBrightYellow    : '\x1b[103m',
              bgBrightBlue      : '\x1b[104m',
              bgBrightMagenta   : '\x1b[105m',
              bgBrightCyan      : '\x1b[106m',
              bgBrightWhite     : '\x1b[107m',
              
              bold              : '\x1b[1m',
              dim               : '\x1b[2m',
              italic            : '\x1b[3m',
              underline         : '\x1b[4m',
              inverse           : '\x1b[7m',
              hidden            : '\x1b[8m',
              strikethrough     : '\x1b[9m',
              
              gray              : '\x1b[38;5;245m',
              
        };
        
        var chr   = {
              warn          : '\u26A0',
              cross         : '\u274C',
              stop          : '\u1F6D1',
              prohibited    : '\u1F6AB',
              check         : '\u2705',
              go            : '\u1F7E2',
              thumb         : '\u1F44D',
              ok            : '\u1F197',
        };
        
        
const files = {
  src: {
    directory: {
      'main.js': {
        file: {
          contents: `
            console.log('Hello from WebContainers!')
          `,
        },
      },
      'main.css': {
        file: {
          contents: `
            body {
              margin: 0;
            }
          `,
        },
      },
    },
  },
  'package.json': {
    file:{contents:'xyz'}
  },
  'index.html': {
    file:{contents:'123'}
  },
  
};




        (async()=>{
        
              mod.stack.add;
              
              var [{Terminal},{FitAddon},{WebContainer}]    = await Promise.all([
                    import('https://cdn.jsdelivr.net/npm/@xterm/xterm/+esm'),
                    import('https://cdn.jsdelivr.net/npm/@xterm/addon-fit/+esm'),
                    import('https://cdn.jsdelivr.net/npm/@webcontainer/api/+esm')
              ]);
              
              term            = new Terminal({
              
                    fontFamily      : 'monospace',
                    fontSize        : 16,
                    lineHeight      : 1.0,
                    
                    theme           : theme.light,
                    rendererType    : 'dom',
                    
              });
              
              var fitAddon        = new FitAddon();
              term.loadAddon(fitAddon);
              term.open(terminal);
              fitAddon.fit();
                                                                                      term.write('booting container ...\r\n')
              webcontainer        = await WebContainer.boot();
              
              mod.stack.complete;
              
              await webcontainer.mount(files);
                                                                                      term.write('spawn jsh ...\r\n')
              shell               = await webcontainer.spawn('jsh');
              var output          = new WritableStream({write(data){term.write(data)}});
              shell.output.pipeTo(output);
              
              var input           = shell.input.getWriter();
              term.onData(data=>input.write(data));
              
              //term.resize();
              term.focus();
              
              console.log(await webcontainer.fs.readdir('/'));
              
        })();
        
        
      </script>
