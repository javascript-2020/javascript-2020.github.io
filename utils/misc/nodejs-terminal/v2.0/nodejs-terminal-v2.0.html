                    import('https://cdn.jsdelivr.net/npm/@xterm/xterm/+esm'),
                    import('https://cdn.jsdelivr.net/npm/@xterm/addon-fit/+esm'),

                    fontSize        : 16,
                    lineHeight      : 1.0,
                    
                    theme           : theme.light,
                    rendererType    : 'dom',
                    
              });
              
              var fitAddon        = new FitAddon();
              term.loadAddon(fitAddon);
              term.open(terminal);
              fitAddon.fit();
                                                                                      term.write('booting container ...\r\n')
              webcontainer        = await WebContainer.boot();
              
              mod.stack.complete;
              
              webcontainer.on('server-ready',(port,url)=>term.write('server-ready :'+url+'-'+port));
              
              await webcontainer.mount(files);
                                                                                      term.write('spawn jsh ...\r\n')
              shell               = await webcontainer.spawn('jsh');
              var output          = new WritableStream({write(data){term.write(data)}});
              shell.output.pipeTo(output);
              
              var input           = shell.input.getWriter();
              term.onData(data=>input.write(data));
              
              //term.resize();
