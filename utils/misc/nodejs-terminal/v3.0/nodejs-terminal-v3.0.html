            <script init>
                                                                                console.clear();
                                                                                console.log('nodejs-terminal-v2.0.html');
                                                                                console.log();
                                                                                console.json=v=>console.log(JSON.stringify(v,null,4));
                                                                                console.hex=v=>console.log(v,'Hex:',[...v].map(c=>c.charCodeAt(0).toString(16).padStart(2,'0')).join(' '));
        var version='v2.0';
        var df=true;
        
        
        var ext;
        var $;
        var datatype;
        var menumod;
        var keydown;
        var debug;
        var hs;
        var vm;
        
        var menu;
        
        var misc;
        var filemod;
        var tabs;
        var wcfs;
        var ports;
        var log;
        
        
  //:
  
  
        async function init(){
        
        
              vm.initmod({mod});
              
              
              menu            = menumod();
              
              mod.base.add({ext,$,datatype,keydown,menu,menumod,debug});
              
              
              misc            = mod['misc-hdr'];
              filemod         = mod['file-mod'];
              tabs            = mod['terminal-tabs'];
              wcfs            = mod['webcontainer-fs'];
              ports           = mod['webcontainer-ports'];
              log             = mod['log-mod'];
              
              misc.initmod({ext,$});
              filemod.initmod({ext,$,menumod,menu,complete,source,log});
              tabs.initmod(mod.base);
              tabs.initmod({Terminal,FitAddon,webcontainer,theme,spinner});
              wcfs.initmod({ext,$,filemod,menumod,menu,complete,source,log,debug,webcontainer});
              ports.initmod({$,vm});
              log.initmod({ext,$});
              
              
              await Promise.all([
                    vm.init(),
                    misc.init(),
                    filemod.init(),
                    tabs.init(),
                    wcfs.init(),
                    ports.init(),
                    log.init(),
              ]);
              
              
              initdom();
              
              
              
        }//init
        
        
        
(async()=>{

        mod.stack.add;
        
        ({ext}    = await import('https://libs.ext-code.com/js/io/ext-loader/ext-loader.m.js'));
        
        var promise   = ext.load.libs(
              'js/dom/$.js.api',
              'js/core/datatype.js',
              'js/dom/menumod/menumod.js',
              'js/dom/keydown/keydown.js',
              'js/debug/debug.js',
              'js/string/hs.js',
              'js/dom/viewport-manager/v1.0.0/viewport-manager.js.api',
        );
        [$,datatype,menumod,keydown,debug,hs,vm]   = await promise;
        
        vm    = vm();
        
        mod.stack.complete;
        
})();


            </script>

        var cur         = {};
        
        var Terminal;

        menu_callback['https-server']   = async function(){
        
              if(cwd===null){
                    term.writeln.red('can only install https-server relative to workdir');
                    return;
              }
              
              var s;
              term.writeln('');
              term.write.green('installing https-server ... ');
              setTimeout(()=>{
                    var {x,y}   = cursor.xy();
                    s       = spinner({x,y});
                    term.write('\r\n');
              },50);
              
              var mod     = await import('https://code.ext-code.com/nodejs/servers/https-server/create-archive.m.js');
              
              
              var blob    = await mod.create_archive({download:false});
                                                                                console.log(blob);
              var zip     = await mod.jszip.loadAsync(blob);
              var files   = Object.entries(zip.files);
              var base    = 'https-server/';
              
              for(var [path,file] of files){
              
                    path    = path.slice(base.length);
                    path    = cwd+path;
                                                                                console.log(path);//,file);
                    if(path.length>cwd.length){
                          if(file.dir){
                                await webcontainer.fs.mkdir(path,{recursive:true});
                          }else{
                                                                                //console.log("File:",path,file);
                                                                                //console.log("Content:", content);
                                var buf   = await file.async('uint8array');
                                await webcontainer.fs.writeFile(path,buf);
                          }
                    }
                    
              }//for
              
              
              var process   = await webcontainer.spawn('npm',['i'],{cwd,output:true});
              var stream    = new WritableStream({write(data){term.write(data)}});
              process.output.pipeTo(stream)
              var code      = await process.exit;
              if(code!=0){
                    term.writeln.red('an error ocurred exit code : '+code);
              }
              
              s.stop();
              term.write.green('ok.');
              await prompt();
              
        }//https-server

                                                                                console.log('save-snapshot');
                                                                                console.log(cwd_abs);

                    return;

              var err;

                    await prompt();
                    return;
              }
                                                                                console.log(str);
              var blob    = new Blob([str]);
              var file    = {name:'snapshot.json',icon:snap_icon};
              
              complete.load(file,blob);
              
              term.writeln.green('ok.');
              await prompt();

        async function spawn(cmdline,opts){
        
              if(opts===undefined){
                    opts    = {};
              }
              var output;
              if(typeof opts=='boolean'){
                    output      = opts;
              }else{
                    ({output}   = opts);
              }
              
              
              var args      = cmdline.split(' ');
              var cmd       = args.shift();
              var process   = await webcontainer.spawn(cmd,args,{cwd,output:true});
              var str       = '';
              var stream    = new WritableStream({write(data){
              
                    if(output){
                          str  += data.toString();
                    }else{
                          term.write(data)
                    }
                    
              }});
              process.output.pipeTo(stream)
              var code      = await process.exit;
              return {code,output:str};
              
        }//spawn

        function spinner({term,x,y}){
        
              var spinner     = {};
              spinner.timer   = null;
              spinner.stop    = null;
              spinner.x       = x;
              spinner.y       = y;
              
              var frames      = ["⠋", "⠙", "⠹", "⠸", "⠼", "⠴", "⠦", "⠧", "⠇", "⠏"];
              var i           = 0;
                                                                                // Hide the cursor so it doesn't flicker
              //term.write(cursor.hide);
              setTimeout(setup,50);
              //setup();
              
              return spinner;
              
              
              function setup(){
              
                    if(x===undefined){
                          ({x,y}      = cursor.xy());
                          spinner.x   = x;
                          spinner.y   = y;
                    }
                    
                    
                    spinner.timer   = setInterval(()=>{
                                                                                // \r moves to start of line, colors.cyan makes it pop
                          term.write(`${cursor.save}${cursor.to(x,y)}${colors.cyan}${frames[i]}${colors.reset}${cursor.restore}`);
                          i   = (i+1)%frames.length;
                          
                    },80);
                    
                    
                    spinner.stop    = function(){
                    
                          if(!spinner.timer){
                                return;
                          }
                          
                          clearInterval(spinner.timer);
                          spinner.timer   = null;
                          term.write(`${cursor.save}${cursor.to(x,y)} ${cursor.restore}`);
                                                                                            // Show cursor
                          //term.write(cursor.show);
                          
                    }//stop
                    
              }//setup
              
        }//spinner
