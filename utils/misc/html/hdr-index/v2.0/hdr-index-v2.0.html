

<hdr-index style='position:relative'>

      <template shadowrootmode=open>
      
            <style>
            
  section
  {margin:0;box-sizing:border-box;display:flex;align-items:center;gap:10px;
    padding-bottom:20px;border-bottom:1px solid lightgray;
  }
  
  .icon
    {cursor:pointer;border-radius:3px;border:1px solid gray;box-sizing:border-box;
      width:38px;height:38px;
    }
    
  .item {
        display                     : inline-flex;
        align-items                 : center;
        text-align                  : center;
        background                  : buttonface;
        border-radius               : 3px;
        border                      : 1px solid lightgray;
        padding                     : 5px 7px;
  }
  
  .item-label {
  }
  
  ::slotted(.title) {
        text-align                  : center;
        position                    : absolute;
        left                        : 0;
        right                       : 0;
        top                         : 0px;
        z-index                     : -1;
        margin                      : 0 auto;
  }
  
  
  .date {
        position                    : absolute;
        top                         : 5px;
        right                       : 5px;
  }
  
  a {
        color                       : blue;
  }
  a:visited {
        color                       : blue;
  }
  
  .spc
    {flex:1}
    
  page-source
    {margin-right:20px}
    
  ::slotted([slot=version]), [name=version]
    {font-weight:bold;color:blue;margin-right:10px;font-family:monospace;font-size:16px}
    
  ::slotted([slot=version]), [name=version]
    {margin-right:10px;font-family:monospace;font-size:16px}
    
    
            </style>
            
            <section>
            
                  <div class=item>
                  
                        <a id=home class=item-label href='/'>
                              home
                        </a>
                        
                  </div>
                  
                  <slot name=title></slot>
                  
                  
                  <div class=spc></div>
                  
                  
                  <page-source v2.0 component></page-source>
                  
                  
                  <slot name=filename></slot>
                  
                  <slot name=version></slot>
                  
                  
                  <slot name=date class=date></slot>
                  
            </section>
            
      </template>
      
      <script>
      
(function({mod,host}){
                                                                                //misc/hdr-index.html
                                                                                
  var obj   = {
        version   : 'v2.0',
  };
  
        var df=false
        ;
        
        obj.initmod=function(params){
        }//initmod
        
        
  //:
  
  
        var shadow;
        
        
        var set   = {};
        obj.set   = set;
        
        
  //:
  
  
        obj.init    = async function(){
        }//init
        
        
  //:
  
  
        obj.initdom   = function(){
        
              shadow          = host.shadowRoot;
              
              set.filename();
              if(typeof version!=='undefined'){
                    set.version(version);
              }
              
        }//initdom
        
        
  //:
  
  
        obj.set.version   = function(v){
        
              $(shadow,'[name=version]').textContent    = v;
              
        }//version
        
        
        obj.set.filename    = function(fn){
        
              if(!fn){
                    var str       = window.location.toString();
                    var i         = str.lastIndexOf('/');
                    fn            = str.slice(i+1);
              }
              $(shadow,'[name=filename]').textContent   = fn;
              
        }//filename
        
        
        
        
        
  return obj;
  
//misc/hdr_index
})

      </script>
      
</hdr-index>
