  :host

  section

  .icon, ::slotted(.icon)
    {cursor:pointer;width:20px;height:20px;border:none}
    
  .item-label, ::slotted(.item-label)
    {color:blue}

      <script>
      
(function misc_hdr({mod,host}){

  var obj   = {
        version   : 'v2.0',
  };
  
        var df=true,did='misc-hdr'
        ;
        
        
        var ext,$,menu
        ;
        
        obj.initmod=function(params){
        
              ext       = mod.rd(params,'ext',ext);
              $         = mod.rd(params,'$',$);
              menu      = mod.rd(params,'menu',menu);
              
        }//initmod
        
        
  //:
  
  
        var help;
        var top;
        
        var shadow    = host.shadowRoot;
        
        
        var set   = {};
        obj.set   = set;
        
        
  //:
  
        obj.init    = async function(){
        
              help            = mod['help-file'];
              
              var slot        = $(shadow,'[name=help]');
              var assigned    = slot.assignedNodes()[0];
              var src         = assigned.getAttribute('src');
              
              help.initmod(mod.root.base,{src});
              
              await help.init();
              
              
        }//init
        
        
  //:
  
  
        obj.initdom   = async function(){
        
              shadow          = host.shadowRoot;
              
              await help.initdom();
              
              set.filename();
              
              var v   = 'v1.0';
              if(typeof version!='undefined'){
                    v   = version;
              }
              set.version(v);
              
        }//initdom
        
        
  //:
  
  
        obj.set.version   = function(v){
        
              $(shadow,'[name=version]').textContent    = v;
              
        }//version
        
        
        obj.set.filename    = function(fn){
        
              if(!fn){
                    var str       = document.baseURI;
                    var i         = str.lastIndexOf('/');
                    fn            = str.slice(i+1);
              }
              $(shadow,'[name=filename]').textContent   = fn;
              
        }//filename
        
        
        obj.add   = function(slot,node){debugger;
        
              slot    = $(shadow,`slot[name=${slot}]`);
              if(!slot){
                    return null;
              }
              slot.parentNode.replaceChild(node,slot);
              return slot;
              
        }//add
        
        
        obj.complete    = function(){
        
              $(shadow,'#page-loading').style.visibility    = 'hidden';
              
        }//complete
        
        
        
  return obj;
  
//misc-hdr
})

      </script>
