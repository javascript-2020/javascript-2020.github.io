function pub_buf(pem) {

  // Remove header, footer, and whitespace
  const b64 = pem
    .replace(/-----BEGIN PUBLIC KEY-----/, "")
    .replace(/-----END PUBLIC KEY-----/, "")
    .replace(/\s+/g, "");
    
  const raw = atob(b64);
  const buffer = new ArrayBuffer(raw.length);
  const view = new Uint8Array(buffer);
  
  for (let i = 0; i < raw.length; i++) {
    view[i] = raw.charCodeAt(i);
  }
  
  return buffer;
}


function priv_buf(pem) {

  const b64 = pem
    .replace(/-----BEGIN PRIVATE KEY-----/, "")
    .replace(/-----END PRIVATE KEY-----/, "")
    .replace(/\s+/g, "");
    
  const raw = atob(b64);
  const buffer = new ArrayBuffer(raw.length);
  const view = new Uint8Array(buffer);
  
  for (let i = 0; i < raw.length; i++) {
    view[i] = raw.charCodeAt(i);
  }
  
  return buffer;
}




async function importPublicKey(pem) {

  const binary = pub_buf(pem);
  
  return crypto.subtle.importKey(
    "spki",               // PEM public keys are SPKI
    binary,
    {
      name: "RSA-OAEP",   // or "RSASSA-PKCS1-v1_5" for signatures
      hash: "SHA-256"
    },
    true,                 // extractable
    ["encrypt"]           // allowed usages
  );
  
}


async function importPrivateKey(pem) {

  const binary = priv_buf(pem);
  
  return crypto.subtle.importKey(
    "pkcs8",              // PEM private keys are PKCS#8
    binary,
    {
      name: "RSA-OAEP",   // must match the public key algorithm
      hash: "SHA-256"
    },
    true,                 // extractable
    ["decrypt"]           // allowed usages
  );
  
}

              var bin     = atob(b64);

              var uint8   = new Uint8Array(bytes);
              var buf     = uint8.buffer;
              return buf;

        function buf_blob(buf){
        
              var uint8   = new Uint8Array(buf);
              var blob    = new Blob([uint8]);
              return blob;
              
        }//buf_blob
        
        
        async function blob_buf(blob){
        
              var buf   = await blob.arrayBuffer();
              return buf;
              
        }//blob_buf
        
        
        function b64_blob(b64,type='text/plain'){
        
              var bin       = atob(b64);
              var bytes     = [...bin].map(c=>c.charCodeAt(0));
              var uint8     = new Uint8Array(bytes);
              var blob      = new Blob([uint8],{type});
              return blob;
              
        }//b64_blob
        
        
        async function blob_b64(blob){
        
              var buf       = await blob.arrayBuffer();
              var bytes     = new Uint8Array(buf);
              var bin       = bytes.reduce((acc,byte)=>acc+=String.fromCharCode(byte),'');
              var b64       = btoa(bin);
              return b64;
              
        }//blob_b64
