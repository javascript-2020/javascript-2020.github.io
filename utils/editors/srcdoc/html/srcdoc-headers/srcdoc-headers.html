            <div id=root>
            
                  <div id=hdr>
                        <input id=name>
                        <input id=value>
                        <input value=add type=button>
                        <div class=spc>

                        <input value=clear type=button>
                  </div>

                              </div>
                              <div class=value>
                              </div>

                        </div>

      <script>
      
(function({mod,host}){

  var obj   = {};
  
        var df=true,did='srcdoc-headers'
        ;
        
        var $,debug
        ;
        
        obj.initmod   = function(params){
        
              $             = mod.rd(params,'$',$);
              debug         = mod.rd(params,'debug',debug);
              
        }//initmod
        
        
  //:
  
  
        var headers     = {};
        obj.headers     = headers;
        
        var shadow;
        var ui          = {};
        var list;
        var item;
        
  //:
  
  
        obj.init    = async function(){
                                                                                debug=eval(debug.mod);
                                                                                debug('init');
                                                                                
        }//init
        
        
  //:
  
  
        obj.initdom   = async function(){
        
              shadow                              = host.shadowRoot;
              
              
              var hdr                             = $(shadow,'#hdr');
              
              ui.name                             = $(hdr,'#name');
              ui.value                            = $(hdr,'#value');
              
              $(hdr,'[value=add]').onclick        = btn.add;
              $(hdr,'[value=clear]').onclick      = btn.clear;
              
              
              list                                = $(shadow,'#list');
              item                                = $(list,'.item');
              item.remove();
              
              
        }//initdom
        
        
  //:
  
  
        btn.add   = function(){
        
              var name    = ui.name.value;
              var value   = ui.value.value;
              
              headers[name]   = value;
              
              var nitem   = item.cloneNode(true);
              $(nitem,'.name').textContent    = name;
              $(nitem,'.value').textContent   = value;
              $(nitem,'.remove').onclick      = remove;
              list.append(nitem);
              
              ui.name.value     = '';
              ui.value.value    = '';
              
              
              function remove(){
              
                    delete headers[name];
                    nitem.remove();
                    
              }//remove
              
        }//add
        
        
        btn.clear   = function(){
        
              for(var key in headers){
              
                    delete headers[key];
                    
              }//for
              list.replaceChildren();
              
        }//clear
        
        
        
  return obj;
  
})

      </script>
      
</srcdoc-headers>
