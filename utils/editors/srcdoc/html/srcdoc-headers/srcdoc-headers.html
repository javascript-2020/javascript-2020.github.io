  #root
    {display:flex;flex:direction:column;gap:10px;padding:10px}
    
  #hdr
    {display:flex;gap:10px}
    
  #list
    {flex:1;display:flex;flex-direction:column}
    
  #item
    {}
    
    
    
  input
    {font-size:16px;padding:5px 10px}
  input[type=button]
    {cursor:pointer}

            <img id=icon>
            
            <div id=root>
            
                  <div id=hdr>
                        <input id=name>
                        <input id=value>
                        <input value=add type=button>
                  </div>
                  
                  <div id=list>
                        <div class=item>
                              <div class=name>
                              </div>
                              <div class=value>
                              </div>
                              <img class=remove>
                        </div>
                  </div>
            </div>
            
      </template>
      
      <script>
      
(function({mod,host}){

  var obj   = {};
  
        var df=true,did='srcdoc-headers'
        ;
        
        var $,debug
        ;
        
        obj.initmod   = function(params){
        
              $             = mod.rd(params,'$',$);
              debug         = mod.rd(params,'debug',debug);
              
        }//initmod
        
        
  //:
  
  
        var headers     = {};
        obj.headers     = headers;
        
        var shadow;
        var ui          = {};
        var list;
        var item;
        
  //:
  
  
        obj.init    = async function(){
                                                                                debug=eval(debug.mod);
                                                                                debug('init');
                                                                                
        }//init
        
        
  //:
  
  
        obj.initdom   = async function(){
        
              shadow                              = host.shadowRoot;
              
              
              var hdr                             = $(shadow,'#hdr');
              
              ui.name                             = $(hdr,'#name');
              ui.value                            = $(hdr,'#value');
              
              $(hdr,'[value=add]').onclick        = btn.add;
              
              
              list                                = $(shadow,'#list');
              item                                = $(list,'.item');
              item.remove();
              
              
        }//initdom
        
        
  //:
  
  
        btn.add   = function(){
        
              var name    = ui.name.value;
              var value   = ui.value.value;
              
              headers[name]   = value;
              
              var nitem   = item.cloneNode(true);
              $(nitem,'.name').textContent    = name;
              $(nitem,'.value').textContent   = value;
              $(nitem,'.remove').onclick      = remove;
              list.append(nitem);
              
              
              function remove(){
              
                    delete headers[name];
                    nitem.remove();
                    
              }//remove
              
        }//add
        
        
        
        
  return obj;
  
})

      </script>
      
</srcdoc-headers>
