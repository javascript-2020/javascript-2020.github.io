                  </div>

                  <img class='paste icon'>

                  <input type=button value=go>
            </div>
            
            <iframe></iframe>

      <script>
      
        var hdrs;
        
        var chk           = {};
        var input;
        var iframe;
        
        
        var btn           = {};
        var onmsg         = {};
        
        
    //:
    
    
        async function initdom(){
                                                                                debug('initdom');
              await vm.initdom();
              
              var vparams               = {initmod:{icons:{remove:false}}};
              var [viewport,headers]    = await Promise.all([vm.new(vparams),mod.component('srcdoc-headers',{component:'page'})]);
              viewport.hide();
              viewport.pos({x:200,y:200,w:630,h:250});
              viewport.body.append(headers.__host);
              hdrs    = {viewport,headers};
              
              
              root                                = document.body;
              
              chk.github                          = $.chkbox(root,'#github-root');
              input                               = $(root,'#url');
              
              $(root,'.copy').onclick             = btn.copy;
              $(root,'.paste').onclick            = btn.paste;
              
              $(root,'#hdrs-icon').onclick        = btn['hdrs-icon'];
              $(root,'[value=go]').onclick        = btn.go;
              
              
              iframe                              = $(root,'iframe');
              
              
              
              
        }//initdom
        
        
        btn.copy    = async function(){
        
              var txt   = input.value;
              await navigator.clipboard.writeText(txt);
        }//copy
        
        
        btn.paste   = async function(){
        
              var txt       = await navigator.clipboard.readText();
              input.value   = txt;
              
        }//paste
        
        
        btn.go    = async function(){
                                                                                debug('btn.go');
              var url       = input.value;
              
              if(chk.github.checked){
                                                                                debug('github');
                    var result    = github.parse(url);
                    if(result.error){
                          alert(result.error);
                          return;
                    }
                    
                    if(!result.token){
                          result.token    = localStorage['github-token'];
                    }
                    
                    if(result.token){
                          result.api    = true;
                    }
                    url   = github.build(result);
              }
              
                                                                                debug(url);
              var headers   = hdrs.headers.headers;
                                                                                debug.json(headers);
              var err;
              try{
              
                    var res   = await fetch(url,{headers});
                    
              }//try
              catch(err2){
              
                    err   = err2;
                    
              }//catch
              if(err){
                    alert(err.toString());
                    return;
              }
              
              
              var html;
              if(github.parse.is.api(url)){
                    var json    = await res.json();
                    var b64     = json.content;
                    html        = window.atob(b64);
              }else{
                    html        = await res.text();
              }
              
              iframe.srcdoc    = html;
              
        }//go
        
        
        btn['hdrs-icon']    = async function(){
        
              if(hdrs.viewport.status=='hidden'){
                    hdrs.viewport.show();
              }else{
                    hdrs.viewport.hide();
              }
              
        }//hdrs-icon
        
        
  //:
  
  
        window.onmessage    = function(e){
        
              var str     = e.data;
              var json    = JSON.parse(str);
              
              switch(json.type){
              
                case 'load'   : onmsg.load(json);       break;
                
              }//switch
              
        }//onmessage
        
        
        onmsg.load    = function(json){
        
              input.value   = json.url;
              
        }//load
        
        
        
        
      </script>
