      <script>
      
      
  //:
  
  
        function initdom(rootnode){
        
        
              hdr.initdom();
              
              log.initdom();
              
              
        }//initdom
        
        
        async function query(rel){
        
              var date;
              var fn;
              
              if(!rel){
                    var url     = new URL(window.location.toString());
                    
                    if(url.searchParams.toString()==''){
                          console.log('no search params');
                          return;
                    }
                    
                    date        = url.searchParams.get('date');
                    fn          = url.searchParams.get('file');
                    var i       = fn.lastIndexOf('.');
                    var dir     = fn.slice(0,i);
                    rel         = `${date}/${dir}/${fn}`;
              }else{
                    var i   = rel.indexOf('/');
                    date    = rel.slice(0,i);
                    var i   = rel.lastIndexOf('/');
                    fn      = rel.slice(i+1);
              }
              
              var i       = rel.lastIndexOf('.');
              var fext    = rel.slice(i+1);
              
              $('#date').textContent    = date;
              $('#file').textContent    = fn;
              
              title(rel);
              desc(rel);
              
                                                                                console.log(fext,fn);
              var dom;
              switch(fext){
              
                case 'html'   : dom   = document.createElement('snippet-html-console');       break;
                case 'js'     : dom   = document.createElement('snippet-console');            break;
                
              }//switch
              
              
              dom.setAttribute('id','test');
              dom.toggleAttribute('component',true);
              dom.toggleAttribute('v2.0',true);
              dom.setAttribute('src',rel);
              
              document.body.append(dom);
              await mod.build({root:dom,mod});
              mod.test.initmod({ext,$,menu,ace});
              await mod.test.init();
              mod.test.initdom();
              
              
        }//query
        
        
        
        function title(rel){
        
              var i1      = rel.lastIndexOf('.');
              var i2      = rel.lastIndexOf('/');
              var str     = rel.slice(i2+1,i1);
              str         = str.replaceAll('-',' ');
              str         = str.replaceAll('_',' ');
              
              var node    = $('display-hdr .title');
              var s       = node.textContent;
              s          += ' : '+str;
              node.textContent    = s;
              
        }//title
        
        
        async function desc(rel){
        
              var i       = rel.lastIndexOf('.');
              var path    = rel.slice(0,i+1);
              path       += 'md';
              
              var err;
              try{
              
                    var res   = await fetch(path);
                    
              }//try
              catch(err2){
              
                    err   = err2;
                    
              }//catch
              if(err){
                    return;
              }
              if(!res.ok){
                    return;
              }
              
              var txt   = await res.text();
              
              await libs();
              
              var opts                = {linkTarget:'_blank'};
              opts.html               = true;
              opts.breaks             = false;
              opts.linkify            = true;
              
              var md                  = markdownit(opts);
              var opts2               = {leftDelimiter:'{',rightDelimiter:'}',allowedAttributes:['id','class',/^data-.*$/]};
              md.use(markdownItAttrs,opts2);
              var html                = md.render(txt);
              
              $('#desc').innerHTML    = html;
              
              
        }//desc
        
        
        
        function libs(){
        
              var link    = document.createElement('link');
              link.setAttribute('rel','stylesheet');
              link.setAttribute('href','/css/github-markdown-light.css');
              document.head.append(link);
              
              var resolve,promise=new Promise(res=>resolve=res);
              var ct          = 0;
              
              var script      = document.createElement('script');
              script.src      = 'https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js';
              script.onload   = onload;
              document.head.append(script);
              
              var script      = document.createElement('script');
              script.src      = 'https://cdn.jsdelivr.net/npm/markdown-it-attrs@4.3.1/markdown-it-attrs.browser.min.js';
              script.onload   = onload;
              document.head.append(script);
              
              return promise;
              
              
              function onload(){
              
                    ct++;
                    if(ct!=2)return;
                    resolve();
                    
              }//onload
              
        }//libs
        
        
        
        
      </script>
